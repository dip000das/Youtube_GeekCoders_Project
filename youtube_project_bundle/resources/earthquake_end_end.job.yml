resources:
  jobs:
    Youtube_EarthQuake_End_End_Job:
      name: Youtube_EarthQuake_End_End_Job
      tasks:
        - task_key: ingestion_Bronze
          notebook_task:
            notebook_path: ../src/notebooks/ingestion_Bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Bronze_Silver_EarthQuake
          depends_on:
            - task_key: ingestion_Bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_silver_earthquake_etl.id}
            full_refresh: false
        - task_key: Youtube_EarthQuake_Dashboard
          depends_on:
            - task_key: Bronze_Silver_EarthQuake
          dashboard_task:
            subscription: {}
            warehouse_id: 7a81cda0497cd241
            dashboard_id: ${resources.dashboards.earthquake_monitor.id}
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED